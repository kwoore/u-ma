name: Kedi Mod Build (Java 25 Fix)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      # Gradle'ın kendisinin çalışması için Java 21 (Hata almaz)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Modun derlenmesi için Java 25 (Gerekli olan)
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build with Gradle
        # JAVA_HOME_25_X64 değişkeni setup-java tarafından otomatik oluşturulur
        run: ./gradlew build --no-daemon -Dorg.gradle.java.home="${{ env.JAVA_HOME_25_X64 }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KediMod-Output
          path: build/libs/*.jar
