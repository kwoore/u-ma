name: Kedi Mod Build (26.1.2 Fix)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 26.1.x sürümleri Java 25 gerektirir
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Make Gradle Executable
        run: chmod +x gradlew

      # Dosya yapısını görmek için bu adım kalsın
      - name: List Files
        run: ls -R

      # 26.1.2 için Gradle 9.4+ ve remapJar kullanımı
      - name: Build with Gradle
        run: ./gradlew clean remapJar --no-daemon

      - name: Upload Mod Jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KediMod-26-Build
          path: build/libs/*.jar
