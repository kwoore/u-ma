name: Kedi Mod Build (Full Fix)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Make Gradle Executable
        run: chmod +x gradlew

      # 'build' yerine 'remapJar' kullanmak her şeyi içine koyar
      - name: Build and Remap
        run: ./gradlew remapJar --no-daemon

      - name: Upload Mod Jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KediMod-Gercek-Dosya
          path: build/libs/*.jar
