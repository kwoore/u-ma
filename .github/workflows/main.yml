name: Kedi Mod Build (Stable Version)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Kararlı sürüm için Java 21 kullanıyoruz
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      # İzin hatasını (126) önleyen komut
      - name: Make Gradle Executable
        run: chmod +x gradlew

      # Modu derleme adımı
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # ZIP dosyasını oluşturan ve indirmene izin veren kritik kısım
      - name: Upload Mod Jar
        uses: actions/upload-artifact@v4
        with:
          name: KediHilesi-Mod-Dosyasi
          path: build/libs/*.jar
