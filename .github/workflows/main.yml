name: Kedi Mod Build (Java 25 & Permission Fix)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      # Gradle'ın ve Loom'un ana motoru için Java 21 (Hata almayı önler)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Modun derlenmesi için gerekli olan Java 25
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      # İzin hatasını (Permission Denied) çözen kritik adım
      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Build with Gradle
        # Gradle Java 21 ile çalışır ama kodu Java 25 ile paketler
        run: ./gradlew build --no-daemon -Dorg.gradle.java.home="${{ env.JAVA_HOME_25_X64 }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KediMod-26.1.2-Final
          path: build/libs/*.jar
