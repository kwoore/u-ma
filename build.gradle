plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT' // Versiyonu 1.9-SNAPSHOT yapmak daha garantidir
    id 'maven-publish'
}

version = "1.0.0"
group = "com.kwoore.uma"

repositories {
    maven { url = "https://maven.fabricmc.net/" } // Fabric dosyaları burada
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.4" // 26.1.2 aslında 1.21.4'e tekabül eder
    mappings "net.fabricmc:yarn:1.21.4+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
}

processResources {
    inputs.property "version", project.version
    filteringCharset = "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}
