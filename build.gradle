pplugins {
    // 1.9-SNAPSHOT veya en az 1.8 sürümü Java 25 (ASM 9.7) desteği sunar
    id 'fabric-loom' version '1.9-SNAPSHOT' 
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
}
version = "26.1.2" 
group = "com.kedihilesi.untitled4"

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// Gerçek bir mod dosyası (remapping) için bunu true yapmalıyız
remapJar {
    enabled = true 
}

repositories {
    maven { url = "https://maven.fabricmc.net/" }
    mavenCentral()
}

dependencies {
    // 26.1.2 sürümü için resmi kütüphaneler
    minecraft "com.mojang:minecraft:26.1.2" 
    mappings loom.officialMojangMappings() 
    modImplementation "net.fabricmc:fabric-loader:0.16.10"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.110.0+1.21.4"
}

// Java 25 Derleme Ayarı
tasks.withType(JavaCompile).configureEach {
    it.options.release = 25 
}
