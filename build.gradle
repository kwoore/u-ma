plugins {
	id 'fabric-loom' version '1.9.2' // Snapshot yerine tam sürüm daha stabildir
}

version = "1.0.0"
group = "com.example"

dependencies {
	minecraft "com.mojang:minecraft:1.21.4"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:0.16.9"

	// 1.21.4 için doğru API sürümü
	modImplementation "net.fabricmc.fabric-api:fabric-api:0.110.0+1.21.4"
}

loom {
	splitEnvironmentSourceSets()
	mods {
		"untitled4" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}
}

// BU BLOĞU EKLE: Client'ın kütüphaneleri görmesini sağlar
sourceSets {
	client {
		compileClasspath += main.compileClasspath
		runtimeClasspath += main.runtimeClasspath
	}
}

java {
	toolchain.languageVersion = JavaLanguageVersion.of(21)
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}

	// Bu satır IntelliJ'in dosya çakışması uyarısını bastırabilir
	duplicatesStrategy = DuplicatesStrategy.INCLUDE
}