plugins {
    id 'fabric-loom' version '1.9.2'
}

version = "26.1.2" 
group = "com.kedihilesi.untitled4"

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// Gerçek bir mod dosyası (remapping) için bunu true yapmalıyız
remapJar {
    enabled = true 
}

repositories {
    maven { url = "https://maven.fabricmc.net/" }
    mavenCentral()
}

dependencies {
    // Burası teknik kütüphane kısmı, burayı 1.21.4 bırakmalısın yoksa hata verir
    minecraft "com.mojang:minecraft:1.21.4"
    mappings "net.fabricmc:yarn:1.21.4+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
}
