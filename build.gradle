plugins {
    id 'fabric-loom' version '1.8-SNAPSHOT' // 1.10 yerine 1.8 çok daha stabildir
}

java {
    // Java 25 yerine 21 kullanıyoruz, Major Version 65 olur ve hata vermez
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.4" // Eğer 26.1.2 hata verirse bunu dene
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.110.0+1.21.4"
}
